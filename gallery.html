<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery Page</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      body {
  margin: 0;
  background: #ef6464;
  overflow-x: hidden;
}

/* Gallery Grid */
.gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  padding: 8px;
}

/* Images */
.gallery img {
  width: 100%;
  border-radius: 12px;
  object-fit: cover;
  aspect-ratio: 1 / 1;
  cursor: pointer;
}

/* Fullscreen Modal */
#modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgb(0, 0, 0);
  display: none;
  justify-content: center;
  align-items: center;
}

#modal img {
  max-width: 100%;
  max-height: 100%;
}
    </style>
  </head>
  <body class="bg-gray-400 flex justify-center items-center flex-col h-50">
    <script src="js/gallery.js"></script>
    <div id="gallery" class="gallery"></div>

<!-- Fullscreen modal -->
<div id="modal">
  <img id="modalImg">
</div>

      <a href="index.html" class="bg-white">Go back</a>
    </button>
  </body>
</html>
