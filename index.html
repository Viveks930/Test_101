<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test101</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body class="bg-pink-300 flex justify-center items-center flex-col min-h-lvh">
    <!-- Loader -->
    <div id="loader">
      <h1 class="ml-7">Hello Baby ❤️</h1>
    </div>

    <!-- heading text -->
    <div class="wrapper">
      <div class="static_txt">Happy B'day</div>
      <ul class="dynamic_txt">
        <li><span>Meri Baby</span></li>
        <li><span>Meri Jaan</span></li>
        <li><span>Meri Cutie</span></li>
        <li><span>Meri Megha</span></li>
      </ul>
    </div>

    <!-- Div for text -->
    <div class="text border-2 px-7 py-5 mx-10">
      <h1>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Reiciendis
        cupiditate ratione adipisci eveniet soluta quod hic porro veniam quam
        eum!
      </h1>
    </div>

    <!-- div for code box -->
    <h2 class="mt-5">Enter the Code</h2>
    <div class="otp-container">
      <input type="text" maxlength="1" class="otp-box" />
      <input type="text" maxlength="1" class="otp-box" />
      <input type="text" maxlength="1" class="otp-box" />
      <input type="text" maxlength="1" class="otp-box" />
    </div>
    <button onclick="checkCode()" class="rounded-full px-5 py-3">Enter</button>

    <!-- script for loader -->
    <script src="./js/loader.js"></script>

    <!-- script for auth -->
    <script src="./js/auth.js"></script>
  </body>
</html>
